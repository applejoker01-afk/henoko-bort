name: 毎日の自動更新

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00 = JST 9:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 依存パッケージのインストール
        run: |
          pip install feedparser requests anthropic
      
      - name: ニュース取得
        run: python scripts/fetch_news.py
      
      - name: YouTube動画取得
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py
      
      - name: AI要約生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_summary.py
      
      - name: 変更をコミット
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/ summary/
          
          # 変更があるかチェック
          if git diff --cached --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "🤖 自動更新: $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ 更新完了"
          fi
