name: 毎日の情報更新リマインダー

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  daily-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 最新の変更を取得
        run: git pull --rebase origin main

      - name: 今日の日付を取得 (JST)
        id: date
        run: |
          TODAY=$(TZ=Asia/Tokyo date +'%Y-%m-%d')
          MONTH=$(TZ=Asia/Tokyo date +'%Y-%m')
          JAPANESE_DATE=$(TZ=Asia/Tokyo date +'%Y年%m月%d日')
          ACCIDENT_DATE="2026-03-16"
          DAYS=$(( ($(date -d "$TODAY" +%s) - $(date -d "$ACCIDENT_DATE" +%s)) / 86400 ))
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "japanese_date=$JAPANESE_DATE" >> $GITHUB_OUTPUT
          echo "days_since=$DAYS" >> $GITHUB_OUTPUT

      - name: 今日の更新ファイルが存在するかチェック
        id: check
        run: |
          FILE="updates/${{ steps.date.outputs.month }}/${{ steps.date.outputs.today }}.md"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ 今日の更新ファイルは既に存在します: $FILE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ 今日の更新ファイルがまだありません: $FILE"
          fi

      - name: 更新ファイルのテンプレートを作成
        if: steps.check.outputs.exists == 'false'
        env:
          JAPANESE_DATE: ${{ steps.date.outputs.japanese_date }}
          TODAY: ${{ steps.date.outputs.today }}
          MONTH: ${{ steps.date.outputs.month }}
          DAYS: ${{ steps.date.outputs.days_since }}
        run: |
          FILE="updates/${MONTH}/${TODAY}.md"
          mkdir -p "updates/${MONTH}"

          cat > "$FILE" << TEMPLATE_END
          # ${JAPANESE_DATE} の更新情報
          **事故から${DAYS}日目**

          ## 📰 報道・メディア情報

          新規主要報道なし。

          ---

          ## 🏛️ 公的機関の発表

          - ✅ 第11管区海上保安本部: 捜査継続中

          ---

          ## 🏫 関係機関の動き

          - 第三者委員会: 調査継続中
          - **ヘリ基地反対協議会: 遺族への直接謝罪なし（${DAYS}日経過）**

          ---

          ## 📊 統計・データ

          - **事故からの経過日数:** ${DAYS}日

          ---

          ## 📝 今日のまとめ

          （今日の主要な動きを3-5行で要約）

          ---

          **更新者:**
          **更新日時:** ${JAPANESE_DATE}
          TEMPLATE_END

          sed -i 's/^          //' "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "🤖 自動作成: ${JAPANESE_DATE} の更新テンプレート（${DAYS}日目）"
          git push

      - name: Issue作成（更新リマインダー）
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.date.outputs.japanese_date }}';
            const days = '${{ steps.date.outputs.days_since }}';
            const file = 'updates/${{ steps.date.outputs.month }}/${{ steps.date.outputs.today }}.md';

            // ラベルが存在しない場合は作成する
            for (const [name, color] of [['daily-update', '0075ca'], ['reminder', 'e4e669']]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 ${today} の情報更新リマインダー（${days}日目）`,
              body: [
                `## ${today} の情報更新（事故から${days}日目）`,
                '',
                '今日の更新テンプレートが自動作成されました。',
                '',
                '### 📄 更新ファイル',
                `\`${file}\``,
                '',
                '### ✅ 確認すべき情報源',
                '',
                '#### 報道機関',
                '- [ ] [産経新聞](https://www.sankei.com/)',
                '- [ ] [読売新聞](https://www.yomiuri.co.jp/)',
                '- [ ] [沖縄タイムス](https://www.okinawatimes.co.jp/)',
                '- [ ] [琉球新報](https://ryukyushimpo.jp/)',
                '',
                '#### 公的機関',
                '- [ ] [第11管区海上保安本部](https://www.kaiho.mlit.go.jp/11kanku/)',
                '- [ ] [文部科学省](https://www.mext.go.jp/)',
                '',
                '#### 遺族の発信',
                '- [ ] [辺野古ボート転覆事故遺族メモ (note)](https://note.com/beloved_tomoka/)',
                '',
                '### 📝 作業手順',
                '',
                '1. 上記の情報源を確認',
                `2. \`${file}\` を編集して更新情報を記載`,
                '3. 変更をコミット・プッシュ',
                '4. このIssueをクローズ',
                '',
                '### 🔔 重要',
                '',
                '- 誤報やデマに注意',
                '- 遺族のプライバシーを最優先',
                '- 情報源を必ず明記',
              ].join('\n'),
              labels: ['daily-update', 'reminder'],
            });
