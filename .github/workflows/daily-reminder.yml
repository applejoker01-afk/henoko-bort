name: 毎日の情報更新リマインダー

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  daily-reminder:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Git設定とリモート最新状態の取得
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
      
      - name: 今日の日付を取得
        id: date
        run: |
          echo "today=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "month=$(TZ=Asia/Tokyo date +'%Y-%m')" >> $GITHUB_OUTPUT
          echo "japanese_date=$(TZ=Asia/Tokyo date +'%Y年%m月%d日')" >> $GITHUB_OUTPUT
          echo "days_since=$(( ( $(date +%s) - $(date -d '2026-03-16' +%s) ) / 86400 ))" >> $GITHUB_OUTPUT
      
      - name: リモートに今日の更新ファイルが存在するかチェック
        id: check
        run: |
          FILE="updates/${{ steps.date.outputs.month }}/${{ steps.date.outputs.today }}.md"
          
          if git ls-tree -r origin/main --name-only | grep -q "^$FILE$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ リモートに今日の更新ファイルが既に存在します: $FILE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ リモートに今日の更新ファイルがまだありません: $FILE"
          fi
      
      - name: 更新ファイルのテンプレートを作成
        if: steps.check.outputs.exists == 'false'
        run: |
          MONTH_DIR="updates/${{ steps.date.outputs.month }}"
          JAPANESE_DATE="${{ steps.date.outputs.japanese_date }}"
          mkdir -p "$MONTH_DIR"
          
          cat > "$MONTH_DIR/${{ steps.date.outputs.today }}.md" <<'TEMPLATE_END'
          # DATE_PLACEHOLDER の更新情報
          
          ## 📰 報道・メディア情報
          
          ### 新聞・ニュースサイト
          - [ ] 産経新聞
          - [ ] 読売新聞
          - [ ] 朝日新聞
          - [ ] 沖縄タイムス
          - [ ] 琉球新報
          
          **更新内容:**
          （ここに報道内容を記載）
          
          ---
          
          ## 🏛️ 公的機関の発表
          
          **更新内容:**
          （ここに公的発表を記載）
          
          ---
          
          ## 📝 今日のまとめ
          
          （今日の主要な動きを3-5行で要約）
          
          ---
          
          **更新者:** としひで  
          **更新日時:** DATE_PLACEHOLDER  
          **事故からの経過:** DAYS_SINCE日
          TEMPLATE_END
          
          sed -i "s/DATE_PLACEHOLDER/$JAPANESE_DATE/g" "$MONTH_DIR/${{ steps.date.outputs.today }}.md"
          sed -i "s/DAYS_SINCE/${{ steps.date.outputs.days_since }}/g" "$MONTH_DIR/${{ steps.date.outputs.today }}.md"
          
          git add "$MONTH_DIR/${{ steps.date.outputs.today }}.md"
          git commit -m "🤖 自動作成: $JAPANESE_DATE の更新テンプレート"
          git push origin main
      
      - name: note用要約記事のテンプレートを作成
        if: steps.check.outputs.exists == 'false'
        run: |
          MONTH_DIR="updates/${{ steps.date.outputs.month }}"
          JAPANESE_DATE="${{ steps.date.outputs.japanese_date }}"
          DAYS_SINCE="${{ steps.date.outputs.days_since }}"
          
          cat > "$MONTH_DIR/${{ steps.date.outputs.today }}-note.md" <<'NOTE_TEMPLATE_END'
          # 辺野古ボート転覆事故 | DATE_PLACEHOLDER の動き
          
          事故からDAYS_SINCE日が経過しました。
          
          ---
          
          ## 📌 今日の主な動き
          
          ### 報道
          
          （ここに今日の主要な報道を1-2行で記載）
          
          ### 捜査・行政
          
          （ここに捜査や行政の動きを1-2行で記載）
          
          ---
          
          ## 💭 遺族として思うこと
          
          （ここに、その日の出来事に対する遺族の視点からのコメントを記載）
          
          ---
          
          ## 🔗 詳細情報
          
          詳しい情報は、[報道検証サイト](https://applejoker01-afk.github.io/henoko-bort/)をご覧ください。
          
          ---
          
          ## 📱 SNS共有用（140文字以内）
          
          ```
          【辺野古事故・DAYS_SINCE日目】
          （ここに今日の最も重要なポイントを140文字以内で記載）
          #辺野古ボート転覆事故
          ```
          
          ---
          
          **知華が亡くなってからDAYS_SINCE日。**  
          **今日も、真実を求めて。**
          
          ---
          
          <small>辺野古ボート転覆事故の真相究明と再発防止を願う遺族による情報発信です。</small>
          NOTE_TEMPLATE_END
          
          sed -i "s/DATE_PLACEHOLDER/$JAPANESE_DATE/g" "$MONTH_DIR/${{ steps.date.outputs.today }}-note.md"
          sed -i "s/DAYS_SINCE/$DAYS_SINCE/g" "$MONTH_DIR/${{ steps.date.outputs.today }}-note.md"
          
          git add "$MONTH_DIR/${{ steps.date.outputs.today }}-note.md"
          git commit -m "📝 note用要約作成: $JAPANESE_DATE"
          git push origin main
      
      - name: Issue作成（更新リマインダー）
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.date.outputs.japanese_date }}';
            const file = 'updates/${{ steps.date.outputs.month }}/${{ steps.date.outputs.today }}.md';
            const noteFile = 'updates/${{ steps.date.outputs.month }}/${{ steps.date.outputs.today }}-note.md';
            const daysSince = '${{ steps.date.outputs.days_since }}';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 ${today} の情報更新（事故から${daysSince}日目）`,
              body: `## ${today} の情報更新
              
              ### 📄 作成されたファイル
              
              1. **日次更新**: \`${file}\`
              2. **note用要約**: \`${noteFile}\`
              
              ### 📝 作業手順
              
              1. 情報源を確認
              2. \`${file}\` に詳細を記載
              3. \`${noteFile}\` にnote用要約を記載
              4. note.comに投稿
              5. このIssueをクローズ
              
              ---
              
              **事故から${daysSince}日が経過しました。**
              `,
              labels: ['daily-update', 'reminder']
            });
